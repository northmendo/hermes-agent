name: Upstream Sync Check

# Automatically rebases the fork bundle branch onto
# NousResearch/hermes-agent:main so the latest upstream changes are
# always available on the install branch.  Runs every 8 hours starting
# at 06:00 Pacific (13:00 UTC PDT / 14:00 UTC PST).
#
# The workflow is gated to the fork only — upstream never needs to
# watch itself.  If the rebase conflicts, the job fails and the issue
# tracker will tell you which commits are blocked.

on:
  schedule:
    # 06:00 Pacific ≈ 13:00 UTC (PDT) / 14:00 UTC (PST)
    # Every 8 hours: 13:00, 21:00, 05:00 UTC
    - cron: '0 13,21,5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-bundle:
    # Only run on the fork — upstream doesn't need to watch itself.
    if: github.repository != 'NousResearch/hermes-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      - name: Rebase bundle branch onto upstream
        id: rebase
        run: |
          git checkout feat/northmendo-qol-bundle
          AHEAD=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$AHEAD" >> "$GITHUB_OUTPUT"

          if [ "$AHEAD" -eq 0 ]; then
            echo "status=synced" >> "$GITHUB_OUTPUT"
            echo "Bundle is already up to date with upstream/main."
            exit 0
          fi

          echo "Rebasing $AHEAD commit(s) from upstream/main..."
          if git rebase upstream/main; then
            echo "status=rebased" >> "$GITHUB_OUTPUT"
            echo "Rebase succeeded."
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "Rebase failed. Conflicts need manual resolution."
            exit 1
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.status == 'rebased'
        run: |
          git push --force-with-lease origin feat/northmendo-qol-bundle
          echo "Pushed rebased bundle branch to origin."

      - name: Report result
        if: always()
        run: |
          echo "Status:  ${{ steps.rebase.outputs.status }}"
          echo "Behind:  ${{ steps.rebase.outputs.behind }}"
